<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>ТОМ-1501</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;user-select:none}
html,body{height:100%;overflow:hidden;background:#1c1510;font-family:monospace}
#app{height:100%;display:flex;flex-direction:column;background:linear-gradient(180deg,#2a2016 0%,#1c1510 100%)}
#hdr{padding:8px 14px 5px;text-align:center;border-bottom:2px solid #4a3820;flex-shrink:0}
#hdr h1{color:#e8c47a;font-size:19px;letter-spacing:4px;text-shadow:0 0 10px rgba(232,196,122,.4)}
#hdr .sub{color:#7a6440;font-size:10px;letter-spacing:2px;margin-top:1px}
#regPanel{display:flex;border-bottom:1px solid #4a3820;flex-shrink:0}
.rSec{flex:1;padding:6px 5px}
.rSec.L{border-right:1px solid #4a3820}
.rLbl{color:#5a4830;font-size:9px;letter-spacing:1px;text-align:center;margin-bottom:3px}
.rBtns{display:flex;flex-wrap:wrap;gap:3px;justify-content:center}
.rbtn{flex:1 1 28%;min-width:54px;padding:6px 2px;text-align:center;background:#221a10;border:1px solid #4a3820;border-radius:4px;color:#7a6440;font-size:9px;line-height:1.3;cursor:pointer}
.rbtn.on{background:#b89040;color:#120e08;border-color:#e8c47a;box-shadow:0 0 6px rgba(232,196,122,.5)}
#fxRow{display:flex;flex-wrap:wrap;gap:6px;padding:6px 10px;border-bottom:1px solid #4a3820;flex-shrink:0;align-items:center}
.fxG{display:flex;align-items:center;gap:4px;flex:1;min-width:120px}
.fxG label{color:#b89878;font-size:9px;white-space:nowrap;min-width:48px}
input[type=range]{flex:1;-webkit-appearance:none;height:4px;background:#3a2e18;border-radius:2px;outline:none}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:15px;height:15px;border-radius:50%;background:#e8c47a;box-shadow:0 0 4px rgba(232,196,122,.5)}
#ctrlRow{display:flex;align-items:center;gap:7px;padding:6px 10px;border-bottom:1px solid #4a3820;flex-shrink:0;flex-wrap:wrap}
.sbtn{width:28px;height:28px;border-radius:5px;background:#2a2016;border:1px solid #4a3820;color:#e8c47a;font-size:13px;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0}
.sbtn:active{background:#4a3820}
.mlbl{color:#b89878;font-size:9px;min-width:54px;text-align:center}
#sus{padding:7px 12px;border-radius:6px;background:#2a2016;border:1px solid #4a3820;color:#e8c47a;font-size:10px;letter-spacing:1px;flex-shrink:0;cursor:pointer}
#sus.on{background:#e8c47a;color:#120e08;box-shadow:0 0 10px rgba(232,196,122,.6)}
#splitToggle{padding:5px 8px;border-radius:4px;background:#2a2016;border:1px solid #4a3820;color:#7a6440;font-size:9px;cursor:pointer;flex-shrink:0}
#splitToggle.on{background:#3a2e18;color:#e8c47a;border-color:#4a3820}
#kbArea{flex:1;position:relative;padding:0 4px 6px;min-height:0}
#kbWrap{position:relative;height:100%;background:#0d0a06;border-radius:6px;overflow:hidden}
#wKeys{position:absolute;top:0;left:0;right:0;bottom:0;display:flex}
.key.wht{height:100%;background:linear-gradient(180deg,#ede3ce 0%,#d8ccb0 100%);border-right:1px solid #7a6840;display:flex;align-items:flex-end;justify-content:center;padding-bottom:5px;font-size:8px;color:#7a6840}
.key.wht.act{background:linear-gradient(180deg,#c9a040 0%,#b08030 100%)}
#bKeys{position:absolute;top:0;left:0;right:0;height:60%}
.key.blk{position:absolute;top:0;height:100%;background:linear-gradient(180deg,#221a10 0%,#120e08 100%);border-radius:0 0 4px 4px;border:1px solid #000}
.key.blk.act{background:linear-gradient(180deg,#4a3820 0%,#2a2016 100%)}
#splitMark{display:none;position:absolute;top:0;bottom:0;width:2px;background:#e8402a;z-index:5;pointer-events:none;opacity:.8}
#hint{text-align:center;color:#4a3820;font-size:9px;padding:3px 0;flex-shrink:0}
</style>
</head>
<body>
<div id="app">
  <div id="hdr">
    <h1>ТОМ-1501</h1>
    <div class="sub">ORCHESTRAL STRING SYNTHESIZER · ТУЛА</div>
  </div>
  <div id="regPanel">
    <div class="rSec L">
      <div class="rLbl">АККОМПАНЕМЕНТ</div>
      <div class="rBtns" id="leftRegs"></div>
    </div>
    <div class="rSec">
      <div class="rLbl">СОЛО</div>
      <div class="rBtns" id="rightRegs"></div>
    </div>
  </div>
  <div id="fxRow">
    <div class="fxG"><label>ВИБРАТО</label><input type="range" id="vibAmt" min="0" max="1" step="0.01" value="0"></div>
    <div class="fxG"><label>СКОР.ВИБ.</label><input type="range" id="vibRate" min="3" max="9" step="0.1" value="5.2"></div>
    <div class="fxG"><label>ГРОМКОСТЬ</label><input type="range" id="vol" min="0" max="1" step="0.01" value="0.8"></div>
  </div>
  <div id="ctrlRow">
    <div class="sbtn" id="octD">−</div>
    <div class="mlbl" id="octLbl">Окт: 0</div>
    <div class="sbtn" id="octU">+</div>
    <div id="splitToggle">СПЛИТ</div>
    <div class="sbtn" id="spD">◀</div>
    <div class="sbtn" id="spU">▶</div>
    <div id="sus">SUSTAIN</div>
  </div>
  <div id="kbArea">
    <div id="kbWrap">
      <div id="wKeys"></div>
      <div id="bKeys"></div>
      <div id="splitMark"></div>
    </div>
  </div>
  <div id="hint">Свайп 2 пальца — октава · СПЛИТ — раздел клавиатуры</div>
</div>
<script>
// TOM-1501 ENGINE v4
// Каждый регистр — уникальная волна + уникальный фильтр
// Сплит убран по умолчанию: все регистры играют на всей клавиатуре
// Левые регистры = аккомпанемент (более низкий характер)
// Правые регистры = соло (более яркий характер)

let actx = null;
let preBus = null;
let outGain = null;

const voices = {};
const noteOrder = [];
const sustained = new Set();
let sustainOn = false;
const MAX_POLY = 10;

const P = {
  octaveShift: 0,
  vibratoRate: 5.2,
  vibratoAmt:  0,
  volume:      0.8,
  splitEnabled: false,  // по умолчанию выключен
  splitPoint:   48,

  registers: {
    // ===== ЛЕВАЯ ЧАСТЬ — АККОМПАНЕМЕНТ =====
    bass16: {
      side:'left', on:false, oct:-1, gain:0.24,
      // контрабас: только основной тон + слабая 2-я гармоника, глубокий LP-фильтр
      harmonics: [0, 1.0, 0.25, 0.08, 0.02],
      filterType:'lowpass', filterFreq:600, filterQ:0.6,
      attack:0.06, release:0.7
    },
    cello8: {
      side:'left', on:true, oct:0, gain:0.20,
      // виолончель: тёплый, 2-я гармоника подчёркнута, LP ~1400
      harmonics: [0, 1.0, 0.60, 0.22, 0.10, 0.05],
      filterType:'lowpass', filterFreq:1400, filterQ:0.7,
      attack:0.055, release:0.65
    },
    viola8: {
      side:'left', on:false, oct:0, gain:0.18,
      // альт: чуть ярче виолончели, LP ~2200
      harmonics: [0, 1.0, 0.55, 0.30, 0.14, 0.07, 0.03],
      filterType:'lowpass', filterFreq:2200, filterQ:0.8,
      attack:0.05, release:0.6
    },
    piano: {
      side:'left', on:false, oct:0, gain:0.22,
      // пианино: быстрая атака, много верхних гармоник, быстрый release
      harmonics: [0, 1.0, 0.30, 0.18, 0.12, 0.08, 0.05, 0.03, 0.02],
      filterType:'lowpass', filterFreq:5000, filterQ:0.3,
      attack:0.003, release:0.28
    },
    clavier: {
      side:'left', on:false, oct:0, gain:0.18,
      // клавесин: очень быстрая атака, нечётные гармоники (квадратная), очень быстрый release
      harmonics: [0, 1.0, 0.0, 0.55, 0.0, 0.28, 0.0, 0.14, 0.0, 0.07],
      filterType:'bandpass', filterFreq:2800, filterQ:1.2,
      attack:0.001, release:0.18
    },
    accomp: {
      side:'left', on:false, oct:0, gain:0.16,
      // аккомпанемент: мягкий ensemble, много гармоник, LP ~1800
      harmonics: [0, 1.0, 0.50, 0.28, 0.15, 0.09, 0.05, 0.03],
      filterType:'lowpass', filterFreq:1800, filterQ:0.5,
      attack:0.08, release:0.7
    },

    // ===== ПРАВАЯ ЧАСТЬ — СОЛО =====
    violin8: {
      side:'right', on:true, oct:0, gain:0.20,
      // скрипка 8': яркий стринг-звук, LP ~3500, подчёркнутые верхние гармоники
      harmonics: [0, 1.0, 0.55, 0.38, 0.22, 0.14, 0.09, 0.05, 0.03],
      filterType:'lowpass', filterFreq:3500, filterQ:0.9,
      attack:0.04, release:0.6
    },
    violin4: {
      side:'right', on:false, oct:1, gain:0.16,
      // скрипка 4' (октава выше): очень яркий, LP ~5000
      harmonics: [0, 1.0, 0.50, 0.35, 0.20, 0.13, 0.08, 0.05],
      filterType:'lowpass', filterFreq:5000, filterQ:1.0,
      attack:0.035, release:0.55
    },
    tutti: {
      side:'right', on:false, oct:0, gain:0.22,
      // tutti: самый полный звук, весь диапазон гармоник открыт
      harmonics: [0, 1.0, 0.65, 0.42, 0.28, 0.18, 0.12, 0.07, 0.04, 0.02],
      filterType:'lowpass', filterFreq:6000, filterQ:0.6,
      attack:0.05, release:0.65
    },
    brass: {
      side:'right', on:false, oct:0, gain:0.20,
      // медные: квадратно-подобная волна (нечётные гармоники), резонансный LP
      harmonics: [0, 1.0, 0.85, 0.65, 0.48, 0.35, 0.24, 0.16, 0.10, 0.06],
      filterType:'lowpass', filterFreq:2400, filterQ:2.5,
      attack:0.028, release:0.4
    },
    trumpet: {
      side:'right', on:false, oct:0, gain:0.18,
      // труба: насальный, резкий LP с высоким резонансом
      harmonics: [0, 1.0, 0.80, 0.60, 0.42, 0.28, 0.18, 0.10, 0.05],
      filterType:'lowpass', filterFreq:3200, filterQ:3.5,
      attack:0.02, release:0.35
    }
  }
};

// ===== Кеш периодических волн =====
const waveCache = {};
function getWave(regKey) {
  if (waveCache[regKey]) return waveCache[regKey];
  const h = P.registers[regKey].harmonics;
  const real = new Float32Array(h.length);
  const imag = new Float32Array(h.length);
  for (let i = 0; i < h.length; i++) imag[i] = h[i];
  waveCache[regKey] = actx.createPeriodicWave(real, imag, { disableNormalization: false });
  return waveCache[regKey];
}

// ===== BBD Ensemble (аутентичная схема Solina) =====
function buildEnsemble(input, output) {
  // сухой сигнал
  const dry = actx.createGain(); dry.gain.value = 0.42;
  input.connect(dry); dry.connect(output);

  // LFO 1: ~0.5 Гц
  const lfo1 = actx.createOscillator(); lfo1.frequency.value = 0.5;
  const lg1  = actx.createGain();       lg1.gain.value = 0.009;
  lfo1.connect(lg1); lfo1.start();

  // LFO 2: ~0.83 Гц, противофаза
  const lfo2 = actx.createOscillator(); lfo2.frequency.value = 0.83;
  const lg2  = actx.createGain();       lg2.gain.value = 0.008;
  lfo2.connect(lg2); lfo2.start();

  // Инвертор для противофазной модуляции
  const inv = actx.createGain(); inv.gain.value = -1;
  lg2.connect(inv);

  // Ветка A: 17ms + LFO1
  const dA = actx.createDelay(0.08); dA.delayTime.value = 0.017;
  lg1.connect(dA.delayTime);
  const gA = actx.createGain(); gA.gain.value = 0.46;
  input.connect(dA); dA.connect(gA); gA.connect(output);

  // Ветка B: 35ms + LFO2 инверт
  const dB = actx.createDelay(0.08); dB.delayTime.value = 0.035;
  inv.connect(dB.delayTime);
  const gB = actx.createGain(); gB.gain.value = 0.36;
  input.connect(dB); dB.connect(gB); gB.connect(output);

  // Ветка C: 25ms + LFO1 инверт
  const inv2 = actx.createGain(); inv2.gain.value = -1;
  lg1.connect(inv2);
  const dC = actx.createDelay(0.08); dC.delayTime.value = 0.025;
  inv2.connect(dC.delayTime);
  const gC = actx.createGain(); gC.gain.value = 0.40;
  input.connect(dC); dC.connect(gC); gC.connect(output);
}

function initAudio() {
  if (actx) return;
  actx = new (window.AudioContext || window.webkitAudioContext)({ latencyHint:'interactive', sampleRate:44100 });

  preBus = actx.createGain(); preBus.gain.value = 1.0;

  const ensOut = actx.createGain(); ensOut.gain.value = 1.0;
  buildEnsemble(preBus, ensOut);

  // Выходные фильтры — убирают цифровые артефакты
  const hpf = actx.createBiquadFilter();
  hpf.type = 'highpass'; hpf.frequency.value = 40;
  const lpf = actx.createBiquadFilter();
  lpf.type = 'lowpass';  lpf.frequency.value = 8000; lpf.Q.value = 0.5;

  const limiter = actx.createDynamicsCompressor();
  limiter.threshold.value = -4; limiter.knee.value = 4;
  limiter.ratio.value = 10;     limiter.attack.value = 0.002;
  limiter.release.value = 0.1;

  outGain = actx.createGain(); outGain.gain.value = P.volume;

  ensOut.connect(hpf); hpf.connect(lpf); lpf.connect(limiter);
  limiter.connect(outGain); outGain.connect(actx.destination);

  // Vibrato LFO
  const vLfo = actx.createOscillator(); vLfo.frequency.value = P.vibratoRate;
  const vGain = actx.createGain();      vGain.gain.value = 0;
  vLfo.connect(vGain); vLfo.start();
  initAudio.vGain = vGain;
  initAudio.vLfo  = vLfo;
}

function midiToFreq(midi) { return 440 * Math.pow(2, (midi - 69) / 12); }

function createRegVoice(midi, regKey) {
  const reg = P.registers[regKey];
  const freq = midiToFreq(midi + P.octaveShift * 12 + reg.oct * 12);

  const osc  = actx.createOscillator();
  const osc2 = actx.createOscillator();
  const wave = getWave(regKey);
  osc.setPeriodicWave(wave);
  osc2.setPeriodicWave(wave);
  osc.frequency.value  = freq;
  osc2.frequency.value = freq;
  osc2.detune.value    = 4.8; // лёгкая расстройка для "живости"

  // вибрато
  initAudio.vGain.connect(osc.detune);
  initAudio.vGain.connect(osc2.detune);

  // per-register фильтр — именно он формирует тембр
  const flt = actx.createBiquadFilter();
  flt.type            = reg.filterType;
  flt.frequency.value = reg.filterFreq;
  flt.Q.value         = reg.filterQ;

  const env = actx.createGain();
  env.gain.value = 0;

  osc.connect(flt); osc2.connect(flt); flt.connect(env); env.connect(preBus);

  const now = actx.currentTime;
  env.gain.setValueAtTime(0, now);
  env.gain.linearRampToValueAtTime(reg.gain, now + reg.attack);

  osc.start(); osc2.start();
  osc2.onended = () => {
    try { osc.disconnect(); osc2.disconnect(); flt.disconnect(); env.disconnect(); } catch(e) {}
  };

  return { osc, osc2, env, release: reg.release };
}

function getActiveRegs(midi) {
  if (P.splitEnabled) {
    const side = midi < P.splitPoint ? 'left' : 'right';
    return Object.keys(P.registers).filter(k => P.registers[k].side === side && P.registers[k].on);
  }
  // сплит выключен: все включённые регистры независимо от стороны
  return Object.keys(P.registers).filter(k => P.registers[k].on);
}

function noteOn(midi) {
  if (!actx) initAudio();
  if (actx.state === 'suspended') actx.resume();
  if (voices[midi]) return;
  const regs = getActiveRegs(midi);
  if (!regs.length) return;
  while (noteOrder.length >= MAX_POLY) {
    const old = noteOrder.shift();
    if (voices[old]) doRelease(old, 0.05);
  }
  voices[midi] = regs.map(k => createRegVoice(midi, k));
  noteOrder.push(midi);
}

function doRelease(midi, fadeOverride) {
  const vs = voices[midi]; if (!vs) return;
  const now = actx.currentTime;
  vs.forEach(v => {
    const t = fadeOverride !== undefined ? fadeOverride : v.release;
    v.env.gain.cancelScheduledValues(now);
    v.env.gain.setValueAtTime(v.env.gain.value, now);
    v.env.gain.linearRampToValueAtTime(0, now + t);
    v.osc.stop(now + t + 0.05);
    v.osc2.stop(now + t + 0.05);
  });
  delete voices[midi];
  const i = noteOrder.indexOf(midi); if (i !== -1) noteOrder.splice(i, 1);
}

function noteOff(midi) {
  if (!voices[midi]) return;
  if (sustainOn) { sustained.add(midi); return; }
  doRelease(midi);
}

function setSustain(on) {
  sustainOn = on;
  if (!on) { sustained.forEach(m => doRelease(m)); sustained.clear(); }
}

function setRegister(key, on) { if (P.registers[key]) P.registers[key].on = on; }
function setOctave(n)         { P.octaveShift = Math.max(-2, Math.min(2, n)); }
function setSplit(midi)        { P.splitPoint = midi; }
function setSplitEnabled(on)  { P.splitEnabled = on; }
function setVibrato(amt)      { P.vibratoAmt = amt; if (initAudio.vGain) initAudio.vGain.gain.value = amt * 9; }
function setVibratoRate(hz)   { P.vibratoRate = hz;  if (initAudio.vLfo)  initAudio.vLfo.frequency.value = hz; }
function setVolume(v)         { P.volume = v;        if (outGain)          outGain.gain.value = v; }

window.TOM1501 = {
  noteOn, noteOff, setSustain, setRegister,
  setOctave, setSplit, setSplitEnabled,
  setVibrato, setVibratoRate, setVolume, P
};

</script>
<script>
// TOM-1501 UI v4

const START_MIDI = 36;
const NUM_KEYS   = 37;
let octShift = 0;
const pressed = new Set();

const REG_LABELS = {
  bass16:'Контрабас 16\'', cello8:'Виолончель 8\'', viola8:'Альты 8\'',
  piano:'Пианино', clavier:'Клавесин', accomp:'Аккомп.',
  violin8:'Скрипки 8\'', violin4:'Скрипки 4\'', tutti:'Tutti',
  brass:'Медные', trumpet:'Труба'
};

function isBlack(midi) { return [1,3,6,8,10].includes(midi % 12); }
function whiteCount() {
  let n=0; for(let i=0;i<NUM_KEYS;i++) if(!isBlack(START_MIDI+i)) n++; return n;
}

function buildKeyboard() {
  const wc = document.getElementById('wKeys');
  const bc = document.getElementById('bKeys');
  wc.innerHTML = bc.innerHTML = '';
  const ww = 100 / whiteCount();
  let wi = 0;
  for (let i=0; i<NUM_KEYS; i++) {
    const midi = START_MIDI + i;
    const el = document.createElement('div');
    if (isBlack(midi)) {
      el.className='key blk'; el.dataset.midi=midi;
      el.style.left=(wi*ww - ww*0.3)+'%';
      el.style.width=(ww*0.62)+'%';
      bindKey(el, midi); bc.appendChild(el);
    } else {
      el.className='key wht'; el.dataset.midi=midi;
      el.style.width=ww+'%';
      if (midi%12===0) el.textContent='C'+(Math.floor(midi/12)-1);
      bindKey(el, midi); wc.appendChild(el); wi++;
    }
  }
}

function bindKey(el, midi) {
  const on = e => {
    e.preventDefault();
    if (pressed.has(midi)) return;
    pressed.add(midi); el.classList.add('act');
    window.TOM1501.noteOn(midi);
  };
  const off = e => {
    if (e) e.preventDefault();
    if (!pressed.has(midi)) return;
    pressed.delete(midi); el.classList.remove('act');
    window.TOM1501.noteOff(midi);
  };
  el.addEventListener('touchstart', on,  {passive:false});
  el.addEventListener('touchend',   off, {passive:false});
  el.addEventListener('touchcancel',off, {passive:false});
  el.addEventListener('mousedown',  on);
  el.addEventListener('mouseup',    off);
  el.addEventListener('mouseleave', off);
}

function buildRegisters() {
  document.getElementById('leftRegs').innerHTML  = '';
  document.getElementById('rightRegs').innerHTML = '';
  const regs = window.TOM1501.P.registers;
  Object.keys(regs).forEach(function(k) {
    var r   = regs[k];
    var btn = document.createElement('div');
    btn.className   = 'rbtn' + (r.on ? ' on' : '');
    btn.textContent = REG_LABELS[k] || k;
    btn.setAttribute('data-rk', k);
    btn.onclick = function() {
      var key = this.getAttribute('data-rk');
      var reg = window.TOM1501.P.registers[key];
      reg.on  = !reg.on;
      this.classList.toggle('on', reg.on);
    };
    document.getElementById(r.side==='left' ? 'leftRegs' : 'rightRegs').appendChild(btn);
  });
}

function bindControls() {
  var sb = document.getElementById('sus');
  sb.addEventListener('touchstart', function(e){ e.preventDefault(); sb.classList.add('on');  window.TOM1501.setSustain(true);  }, {passive:false});
  sb.addEventListener('touchend',   function(e){ e.preventDefault(); sb.classList.remove('on'); window.TOM1501.setSustain(false); }, {passive:false});
  sb.addEventListener('mousedown',  function(){ sb.classList.add('on');  window.TOM1501.setSustain(true);  });
  sb.addEventListener('mouseup',    function(){ sb.classList.remove('on'); window.TOM1501.setSustain(false); });

  document.getElementById('vibAmt').oninput  = function(){ window.TOM1501.setVibrato(parseFloat(this.value)); };
  document.getElementById('vibRate').oninput = function(){ window.TOM1501.setVibratoRate(parseFloat(this.value)); };
  document.getElementById('vol').oninput     = function(){ window.TOM1501.setVolume(parseFloat(this.value)); };

  document.getElementById('octD').onclick = function(){
    octShift = Math.max(-2, octShift-1);
    window.TOM1501.setOctave(octShift);
    document.getElementById('octLbl').textContent = 'Окт: '+(octShift>0?'+':'')+octShift;
  };
  document.getElementById('octU').onclick = function(){
    octShift = Math.min(2, octShift+1);
    window.TOM1501.setOctave(octShift);
    document.getElementById('octLbl').textContent = 'Окт: '+(octShift>0?'+':'')+octShift;
  };

  // сплит вкл/выкл
  document.getElementById('splitToggle').onclick = function(){
    var on = window.TOM1501.P.splitEnabled = !window.TOM1501.P.splitEnabled;
    this.classList.toggle('on', on);
    document.getElementById('splitMark').style.display = on ? 'block' : 'none';
  };

  document.getElementById('spD').onclick = function(){
    window.TOM1501.P.splitPoint = Math.max(START_MIDI+1, window.TOM1501.P.splitPoint-1);
    updateSplitMark();
  };
  document.getElementById('spU').onclick = function(){
    window.TOM1501.P.splitPoint = Math.min(START_MIDI+NUM_KEYS-1, window.TOM1501.P.splitPoint+1);
    updateSplitMark();
  };
}

function updateSplitMark() {
  var sp = window.TOM1501.P.splitPoint;
  var wi = 0;
  for (var i=0; i<NUM_KEYS; i++) {
    if (START_MIDI+i >= sp) break;
    if (!isBlack(START_MIDI+i)) wi++;
  }
  document.getElementById('splitMark').style.left = (wi / whiteCount() * 100) + '%';
}

function bindSwipe() {
  var area = document.getElementById('kbArea');
  var sx = null, sw = false;
  area.addEventListener('touchstart', function(e){ if(e.touches.length===2){sx=e.touches[0].clientX;sw=false;} }, {passive:true});
  area.addEventListener('touchmove',  function(e){
    if(!sx||e.touches.length<2||sw) return;
    var dx=e.touches[0].clientX-sx;
    if(Math.abs(dx)>50){
      octShift=Math.max(-2,Math.min(2,octShift+(dx>0?1:-1)));
      window.TOM1501.setOctave(octShift);
      document.getElementById('octLbl').textContent='Окт: '+(octShift>0?'+':'')+octShift;
      sw=true;
    }
  }, {passive:true});
}

window.addEventListener('DOMContentLoaded', function(){
  buildKeyboard();
  buildRegisters();
  bindControls();
  bindSwipe();
  updateSplitMark();
});

</script>
