<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>ТОМ-1501</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;user-select:none}
html,body{height:100%;overflow:hidden;background:#1c1510;font-family:monospace}
#app{height:100%;display:flex;flex-direction:column;background:linear-gradient(180deg,#2a2016 0%,#1c1510 100%)}

#hdr{padding:8px 14px 5px;text-align:center;border-bottom:2px solid #4a3820}
#hdr h1{color:#e8c47a;font-size:19px;letter-spacing:4px;text-shadow:0 0 10px rgba(232,196,122,.4)}
#hdr .sub{color:#7a6440;font-size:10px;letter-spacing:2px;margin-top:1px}

#regPanel{display:flex;border-bottom:1px solid #4a3820;flex-shrink:0}
.rSec{flex:1;padding:7px 6px}
.rSec.L{border-right:1px solid #4a3820}
.rLbl{color:#5a4830;font-size:9px;letter-spacing:1px;text-align:center;margin-bottom:4px}
.rBtns{display:flex;flex-wrap:wrap;gap:3px;justify-content:center}
.rbtn{flex:1 1 28%;min-width:54px;padding:5px 2px;text-align:center;background:#221a10;border:1px solid #4a3820;border-radius:4px;color:#7a6440;font-size:9px;line-height:1.3}
.rbtn.on{background:#b89040;color:#120e08;border-color:#e8c47a;box-shadow:0 0 5px rgba(232,196,122,.5)}

#fxRow{display:flex;flex-wrap:wrap;gap:6px;padding:7px 10px;border-bottom:1px solid #4a3820;flex-shrink:0;align-items:center}
.fxG{display:flex;align-items:center;gap:4px;flex:1;min-width:120px}
.fxG label{color:#b89878;font-size:9px;white-space:nowrap;min-width:46px}
input[type=range]{flex:1;-webkit-appearance:none;height:4px;background:#3a2e18;border-radius:2px}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:15px;height:15px;border-radius:50%;background:#e8c47a;box-shadow:0 0 4px rgba(232,196,122,.5)}

#ctrlRow{display:flex;align-items:center;gap:8px;padding:7px 10px;border-bottom:1px solid #4a3820;flex-shrink:0;flex-wrap:wrap}
.sbtn{width:28px;height:28px;border-radius:5px;background:#2a2016;border:1px solid #4a3820;color:#e8c47a;font-size:13px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.sbtn:active{background:#4a3820}
.mlbl{color:#b89878;font-size:9px;min-width:60px;text-align:center}
#sus{padding:7px 12px;border-radius:6px;background:#2a2016;border:1px solid #4a3820;color:#e8c47a;font-size:10px;letter-spacing:1px;flex-shrink:0}
#sus.on{background:#e8c47a;color:#120e08;box-shadow:0 0 10px rgba(232,196,122,.6)}
.fxG.vol{flex:1;min-width:100px}

#kbArea{flex:1;position:relative;padding:0 4px 6px;min-height:0}
#kbWrap{position:relative;height:100%;background:#0d0a06;border-radius:6px;overflow:hidden}
#wKeys{position:absolute;top:0;left:0;right:0;bottom:0;display:flex}
.key.wht{height:100%;background:linear-gradient(180deg,#ede3ce 0%,#d8ccb0 100%);border-right:1px solid #7a6840;display:flex;align-items:flex-end;justify-content:center;padding-bottom:5px;font-size:8px;color:#7a6840}
.key.wht.act{background:linear-gradient(180deg,#c9a040 0%,#b08030 100%)}
#bKeys{position:absolute;top:0;left:0;right:0;height:60%}
.key.blk{position:absolute;top:0;height:100%;background:linear-gradient(180deg,#221a10 0%,#120e08 100%);border-radius:0 0 4px 4px;border:1px solid #000}
.key.blk.act{background:linear-gradient(180deg,#4a3820 0%,#2a2016 100%)}
#split{position:absolute;top:0;bottom:0;width:2px;background:#e8402a;z-index:5;pointer-events:none;opacity:.7}

#hint{text-align:center;color:#4a3820;font-size:9px;padding:3px 0;flex-shrink:0}
</style>
</head>
<body>
<div id="app">
  <div id="hdr">
    <h1>ТОМ-1501</h1>
    <div class="sub">ORCHESTRAL STRING SYNTHESIZER · ТУЛА</div>
  </div>

  <div id="regPanel">
    <div class="rSec L">
      <div class="rLbl">АККОМПАНЕМЕНТ</div>
      <div class="rBtns" id="leftRegs"></div>
    </div>
    <div class="rSec">
      <div class="rLbl">СОЛО</div>
      <div class="rBtns" id="rightRegs"></div>
    </div>
  </div>

  <div id="fxRow">
    <div class="fxG">
      <label>ВИБРАТО</label>
      <input type="range" id="vibAmt" min="0" max="1" step="0.01" value="0">
    </div>
    <div class="fxG">
      <label>СКОР. ВИБ.</label>
      <input type="range" id="vibRate" min="3" max="9" step="0.1" value="5.2">
    </div>
    <div class="fxG vol">
      <label>ГРОМКОСТЬ</label>
      <input type="range" id="vol" min="0" max="1" step="0.01" value="0.82">
    </div>
  </div>

  <div id="ctrlRow">
    <div class="sbtn" id="octD">−</div>
    <div class="mlbl" id="octLbl">Окт: 0</div>
    <div class="sbtn" id="octU">+</div>
    <div class="sbtn" id="spD">◀</div>
    <div class="mlbl">Сплит</div>
    <div class="sbtn" id="spU">▶</div>
    <div id="sus">SUSTAIN</div>
  </div>

  <div id="kbArea">
    <div id="kbWrap">
      <div id="wKeys"></div>
      <div id="bKeys"></div>
      <div id="split"></div>
    </div>
  </div>
  <div id="hint">Свайп 2 пальца — октава · ◀▶ — точка сплита</div>
</div>
<script>
// ===== TOM-1501 ENGINE v3 =====
// Архитектура: аутентичный ensemble-эффект по схеме Solina/ARP String Ensemble
// BBD ensemble: 3 линии задержки с точными временами и медленными LFO
// Форма волны: пила + подчёркнутая 2-я гармоника через WaveShaper

let actx = null;
let ensembleOut = null;
let limiter = null;

const voices = {};
let sustainOn = false;
const sustained = new Set();
const noteOrder = [];
const MAX_POLY = 12;

const P = {
  attack:      0.035,
  release:     0.55,
  vibratoRate: 5.2,
  vibratoAmt:  0,       // по умолчанию выключено как на оригинале
  volumePedal: 0.82,
  splitPoint:  48,
  octaveShift: 0,

  // регистры — как органные стопы, можно несколько одновременно
  // side: left/right, oct: смещение в октавах
  registers: {
    bass16:   { side:'left',  oct:-1, gain:0.22, on:false },
    cello8:   { side:'left',  oct: 0, gain:0.20, on:true  },
    viola8:   { side:'left',  oct: 0, gain:0.18, on:false },
    piano:    { side:'left',  oct: 0, gain:0.20, on:false },
    clavier:  { side:'left',  oct: 0, gain:0.18, on:false },
    accomp:   { side:'left',  oct: 0, gain:0.16, on:false },
    violin8:  { side:'right', oct: 0, gain:0.20, on:true  },
    violin4:  { side:'right', oct: 1, gain:0.16, on:false },
    tutti:    { side:'right', oct: 0, gain:0.22, on:false },
    brass:    { side:'right', oct: 0, gain:0.20, on:false },
    trumpet:  { side:'right', oct: 0, gain:0.18, on:false },
  }
};

// ===== WaveShaper для имитации выхода делителя частоты =====
// Делитель даёт не чистую пилу — немного мягче, с подчёркнутой 2-й гармоникой
function makeStringWave() {
  const real = new Float32Array(16);
  const imag = new Float32Array(16);
  // основной тон + гармоники с убыванием (типичный спектр string divider)
  real[0] = 0;
  imag[1] = 1.0;    // основная
  imag[2] = 0.55;   // 2-я — подчёркнута (характерно для делителей)
  imag[3] = 0.28;
  imag[4] = 0.15;
  imag[5] = 0.10;
  imag[6] = 0.07;
  imag[7] = 0.05;
  imag[8] = 0.04;
  return actx.createPeriodicWave(real, imag, { disableNormalization: false });
}

function makeBrassWave() {
  const real = new Float32Array(16);
  const imag = new Float32Array(16);
  real[0] = 0;
  imag[1] = 1.0;
  imag[2] = 0.8;
  imag[3] = 0.6;
  imag[4] = 0.4;
  imag[5] = 0.25;
  imag[6] = 0.15;
  imag[7] = 0.08;
  return actx.createPeriodicWave(real, imag, { disableNormalization: false });
}

function makePianoWave() {
  const real = new Float32Array(16);
  const imag = new Float32Array(16);
  real[0] = 0;
  imag[1] = 1.0;
  imag[2] = 0.15;
  imag[3] = 0.08;
  imag[4] = 0.04;
  return actx.createPeriodicWave(real, imag, { disableNormalization: false });
}

// ===== Аутентичный Ensemble BBD =====
// По схеме ARP/Solina String Ensemble:
// три BBD-ветки с задержками ~17ms / ~35ms / ~17ms
// две медленные LFO (~0.5 и ~0.8 Гц) с разными фазами
// именно это соотношение даёт характерный "плавающий" оркестровый звук
function buildEnsemble(input, output) {
  const dry = actx.createGain();
  dry.gain.value = 0.45;
  input.connect(dry);
  dry.connect(output);

  // LFO 1: медленный (~0.5 Гц)
  const lfo1 = actx.createOscillator();
  lfo1.frequency.value = 0.5;
  const lfo1g = actx.createGain();
  lfo1g.gain.value = 0.008;
  lfo1.connect(lfo1g);
  lfo1.start();

  // LFO 2: чуть быстрее (~0.83 Гц), другая фаза — "биение"
  const lfo2 = actx.createOscillator();
  lfo2.frequency.value = 0.83;
  const lfo2g = actx.createGain();
  lfo2g.gain.value = 0.007;
  lfo2.connect(lfo2g);
  lfo2.start();

  // Ветка A: ~17ms, модуляция LFO1
  const dA = actx.createDelay(0.1);
  dA.delayTime.value = 0.017;
  lfo1g.connect(dA.delayTime);
  const gA = actx.createGain();
  gA.gain.value = 0.48;
  input.connect(dA);
  dA.connect(gA);
  gA.connect(output);

  // Ветка B: ~35ms, модуляция LFO2 (инвертированная)
  const invB = actx.createGain();
  invB.gain.value = -1;
  lfo2g.connect(invB);
  const dB = actx.createDelay(0.1);
  dB.delayTime.value = 0.035;
  invB.connect(dB.delayTime);
  const gB = actx.createGain();
  gB.gain.value = 0.38;
  input.connect(dB);
  dB.connect(gB);
  gB.connect(output);

  // Ветка C: ~17ms + 8ms смещение, модуляция LFO1 другой полярностью
  const invC = actx.createGain();
  invC.gain.value = -1;
  lfo1g.connect(invC);
  const dC = actx.createDelay(0.1);
  dC.delayTime.value = 0.025;
  invC.connect(dC.delayTime);
  const gC = actx.createGain();
  gC.gain.value = 0.40;
  input.connect(dC);
  dC.connect(gC);
  gC.connect(output);
}

function initAudio() {
  if (actx) return;
  actx = new (window.AudioContext || window.webkitAudioContext)({
    latencyHint: 'interactive',
    sampleRate: 44100
  });

  // Шина перед ensemble
  const preBus = actx.createGain();
  preBus.gain.value = 1.0;

  // Шина после ensemble
  ensembleOut = actx.createGain();
  ensembleOut.gain.value = 1.0;

  buildEnsemble(preBus, ensembleOut);

  // Мягкий фильтр на выходе — убирает цифровой "блеск"
  const hpf = actx.createBiquadFilter();
  hpf.type = 'highpass';
  hpf.frequency.value = 55; // убрать подгудение низа

  const lpf = actx.createBiquadFilter();
  lpf.type = 'lowpass';
  lpf.frequency.value = 7000; // срез верха как на реальных ВЧ-ограничителях тех лет
  lpf.Q.value = 0.5;

  // Лимитер + вых. громкость
  limiter = actx.createDynamicsCompressor();
  limiter.threshold.value = -4;
  limiter.knee.value = 4;
  limiter.ratio.value = 10;
  limiter.attack.value = 0.002;
  limiter.release.value = 0.1;

  const outGain = actx.createGain();
  outGain.gain.value = P.volumePedal;
  initAudio.outGain = outGain;
  initAudio.preBus = preBus;

  ensembleOut.connect(hpf);
  hpf.connect(lpf);
  lpf.connect(limiter);
  limiter.connect(outGain);
  outGain.connect(actx.destination);

  // Vibrato LFO (по умолчанию выключен)
  const vLfo = actx.createOscillator();
  vLfo.frequency.value = P.vibratoRate;
  const vGain = actx.createGain();
  vGain.gain.value = 0;
  vLfo.connect(vGain);
  vLfo.start();
  initAudio.vibratoGain = vGain;
}

function midiToFreq(midi) {
  return 440 * Math.pow(2, (midi - 69) / 12);
}

function createVoice(midi, regKey) {
  const reg = P.registers[regKey];
  const isBrass = regKey === 'brass' || regKey === 'trumpet';
  const isPiano = regKey === 'piano' || regKey === 'clavier';

  const freq = midiToFreq(midi + P.octaveShift * 12 + reg.oct * 12);

  // основной осциллятор с кастомной волной
  const osc = actx.createOscillator();
  if (isBrass) osc.setPeriodicWave(makeBrassWave());
  else if (isPiano) osc.setPeriodicWave(makePianoWave());
  else osc.setPeriodicWave(makeStringWave());
  osc.frequency.value = freq;

  // второй осциллятор чуть детюнирован — имитация двух слоёв делителя
  const osc2 = actx.createOscillator();
  if (isBrass) osc2.setPeriodicWave(makeBrassWave());
  else if (isPiano) osc2.setPeriodicWave(makePianoWave());
  else osc2.setPeriodicWave(makeStringWave());
  osc2.frequency.value = freq;
  osc2.detune.value = 4.5; // ~4.5 цента — лёгкий chorus внутри голоса

  // vibrato подключаем к обоим
  initAudio.vibratoGain.connect(osc.detune);
  initAudio.vibratoGain.connect(osc2.detune);

  const env = actx.createGain();
  env.gain.value = 0;

  // для фортепиано/клавесина — прямо в шину, минуя ensemble
  const dest = (isPiano) ? actx.destination : initAudio.preBus;

  osc.connect(env);
  osc2.connect(env);
  env.connect(dest);

  const gainVal = reg.gain;
  const now = actx.currentTime;
  // attack медленнее для струнных, быстрее для клавишных
  const atk = isPiano ? 0.003 : P.attack;
  env.gain.setValueAtTime(0, now);
  env.gain.linearRampToValueAtTime(gainVal, now + atk);

  osc.start();
  osc2.start();

  // cleanup после stop
  osc2.onended = () => {
    try { osc.disconnect(); osc2.disconnect(); env.disconnect(); } catch(e) {}
  };

  return { osc, osc2, env, release: isPiano ? 0.3 : P.release, regKey };
}

function noteOn(midi) {
  if (!actx) initAudio();
  if (actx.state === 'suspended') actx.resume();
  if (voices[midi]) return;

  const side = midi < P.splitPoint ? 'left' : 'right';
  const activeRegs = Object.keys(P.registers).filter(k =>
    P.registers[k].side === side && P.registers[k].on
  );
  if (!activeRegs.length) return;

  // voice stealing если полифония переполнена
  while (noteOrder.length >= MAX_POLY) {
    const old = noteOrder.shift();
    if (voices[old]) doRelease(old, 0.05);
  }

  voices[midi] = activeRegs.map(k => createVoice(midi, k));
  noteOrder.push(midi);
}

function doRelease(midi, fadeTime) {
  const vs = voices[midi];
  if (!vs) return;
  const now = actx.currentTime;
  const t = fadeTime !== undefined ? fadeTime : P.release;
  vs.forEach(v => {
    v.env.gain.cancelScheduledValues(now);
    v.env.gain.setValueAtTime(v.env.gain.value, now);
    v.env.gain.linearRampToValueAtTime(0, now + t);
    v.osc.stop(now + t + 0.05);
    v.osc2.stop(now + t + 0.05);
  });
  delete voices[midi];
  const i = noteOrder.indexOf(midi);
  if (i !== -1) noteOrder.splice(i, 1);
}

function noteOff(midi) {
  if (!voices[midi]) return;
  if (sustainOn) { sustained.add(midi); return; }
  doRelease(midi);
}

function setSustain(on) {
  sustainOn = on;
  if (!on) { sustained.forEach(m => doRelease(m)); sustained.clear(); }
}

function setRegister(key, on) {
  if (P.registers[key]) P.registers[key].on = on;
}

function setOctave(n) { P.octaveShift = Math.max(-2, Math.min(2, n)); }
function setSplit(midi) { P.splitPoint = midi; }
function setVibrato(amt) {
  P.vibratoAmt = amt;
  if (initAudio.vibratoGain) initAudio.vibratoGain.gain.value = amt * 8;
}
function setVibratoRate(hz) {
  P.vibratoRate = hz;
}
function setVolume(v) {
  P.volumePedal = v;
  if (initAudio.outGain) initAudio.outGain.gain.value = v;
}

window.TOM1501 = {
  noteOn, noteOff, setSustain, setRegister,
  setOctave, setSplit, setVibrato, setVibratoRate, setVolume,
  P
};

</script>
<script>
// ===== TOM-1501 UI v3 =====

const START_MIDI = 36; // C2 — расширяем диапазон
const NUM_KEYS = 37;   // 3 октавы
let octaveOffset = 0;
const pressed = new Set();

const REG_LABELS = {
  bass16:'Контрабас 16\'', cello8:'Виолончель 8\'', viola8:'Альты 8\'',
  piano:'Пианино', clavier:'Клавесин', accomp:'Аккомп.',
  violin8:'Скрипки 8\'', violin4:'Скрипки 4\'', tutti:'Tutti',
  brass:'Медные', trumpet:'Труба'
};

function isBlack(midi) { return [1,3,6,8,10].includes(midi % 12); }
function countWhites() {
  let n = 0;
  for (let i = 0; i < NUM_KEYS; i++) if (!isBlack(START_MIDI + i)) n++;
  return n;
}

function buildKeyboard() {
  const wc = document.getElementById('wKeys');
  const bc = document.getElementById('bKeys');
  wc.innerHTML = bc.innerHTML = '';
  const ww = 100 / countWhites();
  let wi = 0;
  for (let i = 0; i < NUM_KEYS; i++) {
    const midi = START_MIDI + i;
    const el = document.createElement('div');
    if (isBlack(midi)) {
      el.className = 'key blk';
      el.dataset.midi = midi;
      el.style.left = (wi * ww - ww * 0.3) + '%';
      el.style.width = (ww * 0.62) + '%';
      bindKey(el, midi);
      bc.appendChild(el);
    } else {
      el.className = 'key wht';
      el.dataset.midi = midi;
      el.style.width = ww + '%';
      if (midi % 12 === 0) el.textContent = 'C' + (Math.floor(midi/12)-1);
      bindKey(el, midi);
      wc.appendChild(el);
      wi++;
    }
  }
  updateSplit();
}

function bindKey(el, midi) {
  const on = e => {
    e.preventDefault();
    if (pressed.has(midi)) return;
    pressed.add(midi);
    el.classList.add('act');
    window.TOM1501.noteOn(midi);
  };
  const off = e => {
    if (e) e.preventDefault();
    if (!pressed.has(midi)) return;
    pressed.delete(midi);
    el.classList.remove('act');
    window.TOM1501.noteOff(midi);
  };
  el.addEventListener('touchstart', on, {passive:false});
  el.addEventListener('touchend', off, {passive:false});
  el.addEventListener('touchcancel', off, {passive:false});
  el.addEventListener('mousedown', on);
  el.addEventListener('mouseup', off);
  el.addEventListener('mouseleave', off);
}

function updateSplit() {
  const sp = window.TOM1501.P.splitPoint;
  let wi = 0;
  for (let i = 0; i < NUM_KEYS; i++) {
    if (START_MIDI + i >= sp) break;
    if (!isBlack(START_MIDI + i)) wi++;
  }
  const pct = (wi / countWhites()) * 100;
  document.getElementById('split').style.left = pct + '%';
}

function buildRegisters() {
  ['leftRegs','rightRegs'].forEach(id => document.getElementById(id).innerHTML = '');
  const regs = window.TOM1501.P.registers;
  Object.keys(regs).forEach(k => {
    const r = regs[k];
    const btn = document.createElement('div');
    btn.className = 'rbtn' + (r.on ? ' on' : '');
    btn.textContent = REG_LABELS[k] || k;
    btn.dataset.regKey = k;
    btn.onclick = function() {
      var key = this.dataset.regKey;
      var reg = window.TOM1501.P.registers[key];
      reg.on = !reg.on;
      this.classList.toggle('on', reg.on);
      window.TOM1501.setRegister(key, reg.on);
    };
    document.getElementById(r.side === 'left' ? 'leftRegs' : 'rightRegs').appendChild(btn);
  });
}

function bindControls() {
  // sustain
  const sb = document.getElementById('sus');
  sb.addEventListener('touchstart', e => { e.preventDefault(); sb.classList.add('on'); window.TOM1501.setSustain(true); }, {passive:false});
  sb.addEventListener('touchend', e => { e.preventDefault(); sb.classList.remove('on'); window.TOM1501.setSustain(false); }, {passive:false});
  sb.addEventListener('mousedown', () => { sb.classList.add('on'); window.TOM1501.setSustain(true); });
  sb.addEventListener('mouseup', () => { sb.classList.remove('on'); window.TOM1501.setSustain(false); });

  // vibrato
  document.getElementById('vibAmt').addEventListener('input', e => window.TOM1501.setVibrato(parseFloat(e.target.value)));
  document.getElementById('vibRate').addEventListener('input', e => window.TOM1501.setVibratoRate(parseFloat(e.target.value)));

  // volume
  document.getElementById('vol').addEventListener('input', e => window.TOM1501.setVolume(parseFloat(e.target.value)));

  // octave
  document.getElementById('octD').onclick = () => {
    octaveOffset = Math.max(-2, octaveOffset - 1);
    window.TOM1501.setOctave(octaveOffset);
    document.getElementById('octLbl').textContent = 'Окт: ' + (octaveOffset > 0 ? '+':'') + octaveOffset;
  };
  document.getElementById('octU').onclick = () => {
    octaveOffset = Math.min(2, octaveOffset + 1);
    window.TOM1501.setOctave(octaveOffset);
    document.getElementById('octLbl').textContent = 'Окт: ' + (octaveOffset > 0 ? '+':'') + octaveOffset;
  };

  // split
  document.getElementById('spD').onclick = () => {
    window.TOM1501.P.splitPoint = Math.max(START_MIDI+1, window.TOM1501.P.splitPoint - 1);
    updateSplit();
  };
  document.getElementById('spU').onclick = () => {
    window.TOM1501.P.splitPoint = Math.min(START_MIDI+NUM_KEYS-1, window.TOM1501.P.splitPoint + 1);
    updateSplit();
  };
}

// свайп двумя пальцами = смена октавы
function bindSwipe() {
  const area = document.getElementById('kbArea');
  let sx = null, swiped = false;
  area.addEventListener('touchstart', e => { if (e.touches.length===2){sx=e.touches[0].clientX;swiped=false;} }, {passive:true});
  area.addEventListener('touchmove', e => {
    if (!sx||e.touches.length<2||swiped) return;
    const dx = e.touches[0].clientX - sx;
    if (Math.abs(dx)>50) {
      octaveOffset = Math.max(-2,Math.min(2,octaveOffset+(dx>0?1:-1)));
      window.TOM1501.setOctave(octaveOffset);
      document.getElementById('octLbl').textContent = 'Окт: ' + (octaveOffset>0?'+':'') + octaveOffset;
      swiped=true;
    }
  }, {passive:true});
}

window.addEventListener('DOMContentLoaded', () => {
  buildKeyboard();
  buildRegisters();
  bindControls();
  bindSwipe();
});

</script>
